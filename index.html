<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>雲端記帳 App</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; min-height: 100vh; }
#app { max-width: 480px; margin: 0 auto; position: relative; min-height: 100vh; }

.header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%) !important; padding: 16px 20px 16px; }
.header-date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.hdr-arrow { background: rgba(255,255,255,0.1); border: none; border-radius: 8px; width: 32px; height: 32px; font-size: 18px; cursor: pointer; color: #fff; font-family: inherit; }
.hdr-arrow.disabled { opacity: 0.3; cursor: default; }
.hdr-date-center { text-align: center; flex: 1; }
.hdr-date-label { color: #94a3b8; font-size: 11px; letter-spacing: 2px; margin-bottom: 4px; }
.hdr-date-input { background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.2); border-radius: 10px; color: #fff; font-size: 16px; font-weight: 900; font-family: inherit; padding: 6px 14px; cursor: pointer; outline: none; }
.hdr-date-input::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
.hdr-today-badge { display: inline-block; background: rgba(255,255,255,0.15); color: #94a3b8; font-size: 10px; border-radius: 4px; padding: 2px 8px; margin-top: 4px; cursor: pointer; border: none; font-family: inherit; }
.hdr-net-row { text-align: center; margin-bottom: 12px; }
.hdr-net-label { color: #94a3b8; font-size: 11px; margin-bottom: 2px; }
.hdr-net-val { font-size: 30px; font-weight: 900; }
.summary-bar { display: flex; gap: 6px; }
.summary-item { flex: 1; background: rgba(255,255,255,0.07); border-radius: 10px; padding: 7px 8px; }
.summary-item-label { font-size: 10px; font-weight: 700; margin-bottom: 2px; }
.summary-item-val { color: #fff; font-size: 12px; font-weight: 700; }

.nav { display: flex; background: #fff; border-bottom: 1.5px solid #f1f5f9; position: sticky; top: 0; z-index: 9; overflow-x: auto; }
.nav-btn { flex: 1; padding: 10px 4px; font-size: 11px; background: none; border: none; border-bottom: 2.5px solid transparent; cursor: pointer; transition: all .15s; font-family: inherit; color: #94a3b8; font-weight: 500; white-space: nowrap; min-width: 56px; }
.nav-btn.active { color: #0f172a; font-weight: 800; border-bottom-color: #0f172a; }

.content { padding: 16px 16px 100px; }
.tab { display: none; }
.tab.active { display: block; }

.type-selector { display: flex; gap: 8px; margin-bottom: 12px; }
.type-btn { flex: 1; padding: 10px 0; border-radius: 12px; border: none; font-weight: 800; font-size: 13px; cursor: pointer; transition: all .15s; font-family: inherit; color: #64748b; background: #f1f5f9; }
.type-btn.active-income { background: #22c55e !important; color: #fff !important; box-shadow: 0 4px 16px #22c55e55; }
.type-btn.active-expense { background: #ef4444 !important; color: #fff !important; box-shadow: 0 4px 16px #ef444455; }
.type-btn.active-daily { background: #f59e0b !important; color: #fff !important; box-shadow: 0 4px 16px #f59e0b55; }

.mode-toggle { display: flex; background: #f1f5f9; border-radius: 10px; padding: 3px; margin-bottom: 16px; }
.mode-btn { flex: 1; padding: 8px 0; border-radius: 8px; border: none; font-weight: 700; font-size: 13px; cursor: pointer; transition: all .15s; font-family: inherit; color: #94a3b8; background: none; }
.mode-btn.active { background: #fff; color: #0f172a; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

.product-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.product-btn { padding: 14px 8px; border-radius: 12px; border: 2px solid #e2e8f0; background: #fff; cursor: pointer; text-align: center; transition: all .15s; font-family: inherit; font-weight: 800; font-size: 14px; color: #1e293b; }
.product-btn.selected-income { border-color: #22c55e; background: #dcfce7; color: #22c55e; }
.product-btn.selected-expense { border-color: #ef4444; background: #fee2e2; color: #ef4444; }
.product-btn.selected-daily { border-color: #f59e0b; background: #fef3c7; color: #f59e0b; }

.price-card { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 16px; }
.price-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.price-card-title { font-weight: 900; font-size: 16px; color: #0f172a; }
.close-btn { color: #cbd5e1; background: none; border: none; cursor: pointer; font-size: 18px; line-height: 1; }
.price-label { font-size: 11px; color: #94a3b8; margin-bottom: 6px; letter-spacing: 1px; }
.price-input { width: 100%; padding: 14px 16px; border-radius: 12px; font-size: 28px; font-weight: 900; color: #0f172a; box-sizing: border-box; outline: none; text-align: right; font-family: inherit; }
.price-input-income { border: 2px solid #22c55e; }
.price-input-expense { border: 2px solid #ef4444; }
.price-input-daily { border: 2px solid #f59e0b; }
.quick-prices { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.quick-price-btn { padding: 6px 12px; border-radius: 8px; border: 1.5px solid #e2e8f0; background: #f8fafc; color: #64748b; font-weight: 700; font-size: 13px; cursor: pointer; font-family: inherit; }
.quick-price-btn.active-income { border-color: #22c55e; background: #dcfce7; color: #22c55e; }
.quick-price-btn.active-expense { border-color: #ef4444; background: #fee2e2; color: #ef4444; }
.quick-price-btn.active-daily { border-color: #f59e0b; background: #fef3c7; color: #f59e0b; }
.qty-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.qty-label { font-size: 13px; color: #64748b; font-weight: 600; white-space: nowrap; }
.qty-btn { width: 40px; height: 40px; border-radius: 10px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 20px; cursor: pointer; font-weight: 700; color: #374151; font-family: inherit; }
.qty-input { flex: 1; padding: 8px 0; border-radius: 10px; border: 1.5px solid #e2e8f0; font-size: 18px; font-weight: 800; text-align: center; font-family: inherit; }
.subtotal { border-radius: 10px; padding: 10px 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.subtotal-label { color: #64748b; font-size: 13px; }
.subtotal-val { font-weight: 900; font-size: 20px; }
.note-input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1.5px solid #e2e8f0; font-size: 13px; color: #374151; box-sizing: border-box; font-family: inherit; }

.manual-card { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 16px; }
.field-label { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
.text-input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1.5px solid #e2e8f0; font-size: 14px; box-sizing: border-box; font-family: inherit; }
.row-2 { display: flex; gap: 10px; margin-bottom: 10px; }
.add-btn { width: 100%; padding: 15px 0; border-radius: 14px; border: none; color: #fff; font-size: 16px; font-weight: 900; cursor: pointer; letter-spacing: 1px; font-family: inherit; margin-bottom: 12px; }
.add-btn-income { background: linear-gradient(135deg, #22c55e, #16a34a); box-shadow: 0 6px 20px #22c55e55; }
.add-btn-expense { background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 6px 20px #ef444455; }
.add-btn-daily { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 6px 20px #f59e0b55; }

.record-list { display: flex; flex-direction: column; gap: 8px; }
.record-item { background: #fff; border-radius: 14px; padding: 12px 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 12px; }
.record-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.record-info { flex: 1; min-width: 0; }
.record-name { font-weight: 800; font-size: 14px; color: #1e293b; }
.record-meta { font-size: 12px; color: #94a3b8; }
.record-amount { text-align: right; flex-shrink: 0; }
.record-val { font-weight: 900; font-size: 15px; }
.empty-msg { text-align: center; color: #94a3b8; padding: 40px; }

#toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #0f172a; color: #fff; padding: 10px 24px; border-radius: 100px; font-weight: 700; font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 999; white-space: nowrap; display: none; }
</style>
</head>
<body>
<div id="app">
<div class="header">
<div class="header-date-nav">
<button class="hdr-arrow" onclick="shiftDate(-1)">‹</button>
<div class="hdr-date-center">
<div class="hdr-date-label">選擇日期</div>
<input type="date" class="hdr-date-input" id="hdrDateInput" onchange="setDate(this.value)" />
<div><button class="hdr-today-badge" id="hdrTodayBadge" style="display:none" onclick="setDate(todayISO())">回到今天</button></div>
</div>
<button class="hdr-arrow disabled" id="hdrNextBtn" onclick="shiftDate(1)">›</button>
</div>
<div class="hdr-net-row">
<div class="hdr-net-label">當日盈餘</div>
<div class="hdr-net-val" id="headerNet">NT$0</div>
</div>
<div class="summary-bar">
<div class="summary-item">
<div class="summary-item-label" style="color:#4ade80">↑ 收入</div>
<div class="summary-item-val" id="hdrIncome">NT$0</div>
</div>
<div class="summary-item">
<div class="summary-item-label" style="color:#f87171">↓ 進貨</div>
<div class="summary-item-val" id="hdrExpense">NT$0</div>
</div>
<div class="summary-item">
<div class="summary-item-label" style="color:#fbbf24">◆ 費用</div>
<div class="summary-item-val" id="hdrDaily">NT$0</div>
</div>
</div>
</div>

<div class="nav">
<button class="nav-btn active" onclick="switchTab('record')">⚡ 記帳</button>
<button class="nav-btn" onclick="switchTab('history')">📋 帳目</button>
<button class="nav-btn" onclick="switchTab('products')">📦 品項</button>
</div>

<div class="content">
<div id="tab-record" class="tab active">
<div class="type-selector">
<button class="type-btn active-income" onclick="setRecType('income')">↑ 銷售收入</button>
<button class="type-btn" onclick="setRecType('expense')">↓ 進貨支出</button>
<button class="type-btn" onclick="setRecType('daily')">◆ 日常費用</button>
</div>
<div class="mode-toggle">
<button class="mode-btn active" onclick="setMode('quick')">⚡ 常用品項</button>
<button class="mode-btn" onclick="setMode('manual')">✏️ 手動輸入</button>
</div>
<div id="quick-mode">
<div class="product-grid" id="productGrid"></div>
<div id="priceCard" style="display:none"></div>
</div>
<div id="manual-mode" style="display:none">
<div class="manual-card">
<div style="margin-bottom:10px"><div class="field-label">品名</div><input class="text-input" id="manualName" placeholder="輸入品名" /></div>
<div class="row-2">
<div style="flex:1"><div class="field-label">單價 (NT$)</div><input class="text-input" id="manualPrice" type="number" inputmode="numeric" /></div>
<div style="flex:1">
<div class="field-label">數量</div>
<div style="display:flex;align-items:center;gap:4px">
<button class="qty-btn" onclick="changeQty(-1)">−</button>
<input class="qty-input" id="manualQty" type="number" value="1" style="width:50px" />
<button class="qty-btn" onclick="changeQty(1)">+</button>
</div>
</div>
</div>
<input class="note-input" id="manualNote" placeholder="備註" />
</div>
</div>
<button class="add-btn add-btn-income" id="addBtn" onclick="addRecord()">記帳 ↑</button>
</div>

<div id="tab-history" class="tab">
<div class="record-list" id="recordList"></div>
</div>

<div id="tab-products" class="tab">
<div class="empty-msg">品項管理 (請在 JS 中自行調整 products 變數)</div>
</div>
</div>
</div>
<div id="toast"></div>

<script>
const CLOUD_URL = "https://script.google.com/macros/s/AKfycbz5KNHUNW7XNcjt0EW2lVJozuJKsKqlwMEOD5qxNtvrZtUORW8n0rQn6MC0n567akQHFg/exec";

const CATS = {
income: { label: '銷售收入', color: '#22c55e', bg: '#dcfce7', icon: '↑' },
expense: { label: '進貨支出', color: '#ef4444', bg: '#fee2e2', icon: '↓' },
daily: { label: '日常費用', color: '#f59e0b', bg: '#fef3c7', icon: '◆' },
};

let products = {
income: [{id:1,name:'A產品'},{id:2,name:'B產品'},{id:3,name:'C產品'}],
expense: [{id:7,name:'原物料A'},{id:8,name:'原物料B'}],
daily: [{id:11,name:'水電費'},{id:12,name:'租金'}],
};

let records = [];
let recType = 'income', recMode = 'quick', selectedProduct = null;
let sharedDateStr = '', qty = 1, customPrice = '';

function todayISO() {
const d = new Date();
return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function isoToDisplay(iso) { return iso.replace(/-/g, '/'); }
function formatMoney(n) { return 'NT$' + Number(n).toLocaleString('zh-TW'); }
function showToast(msg) {
const t = document.getElementById('toast');
t.textContent = msg; t.style.display = 'block';
setTimeout(() => t.style.display = 'none', 2000);
}

// 雲端同步：儲存
async function addRecord() {
let name, price, note;
if (recMode==='manual') {
name = document.getElementById('manualName').value.trim();
price = parseFloat(document.getElementById('manualPrice').value);
note = document.getElementById('manualNote').value;
qty = parseInt(document.getElementById('manualQty').value)||1;
if (!name||isNaN(price)) return showToast('請填寫品名與金額');
} else {
if (!selectedProduct) return showToast('請選擇品項');
name = selectedProduct.name;
price = parseFloat(customPrice);
if (isNaN(price)||price<=0) return showToast('請輸入金額');
note = (document.getElementById('quickNote')||{value:''}).value||'';
}

const newRec = { id:Date.now(), type:recType, name, qty, price, total:price*qty, note, date:isoToDisplay(sharedDateStr) };

showToast('同步中...');
try {
// 傳送到 Google Sheets
await fetch(CLOUD_URL, {
method: 'POST',
body: JSON.stringify(newRec)
});

records.unshift(newRec);
localStorage.setItem('bk_records', JSON.stringify(records));

// UI 清空
selectedProduct=null; customPrice=''; qty=1;
if (recMode==='manual') {
['manualName','manualPrice','manualNote'].forEach(id=>document.getElementById(id).value='');
document.getElementById('manualQty').value=1;
}
renderProductGrid(); hidePriceCard(); renderHistory(); updateHeader();
showToast('✓ 雲端已同步');
} catch (e) {
showToast('❌ 同步失敗');
}
}

// 雲端同步：讀取
async function loadFromCloud() {
try {
const res = await fetch(CLOUD_URL);
const cloudData = await res.json();
if (cloudData && Array.isArray(cloudData)) {
// 轉換日期格式並反轉 (最新在後變為最新在前)
records = cloudData.reverse();
localStorage.setItem('bk_records', JSON.stringify(records));
renderHistory(); updateHeader();
}
} catch (e) {
console.error("無法從雲端載入資料");
}
}

function setDate(iso) {
sharedDateStr = iso;
document.getElementById('hdrDateInput').value = iso;
document.getElementById('hdrTodayBadge').style.display = (iso === todayISO()) ? 'none' : 'inline-block';
updateHeader(); renderHistory();
}
function shiftDate(delta) {
const d = new Date(sharedDateStr);
d.setDate(d.getDate() + delta);
setDate(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'));
}

function updateHeader() {
const label = isoToDisplay(sharedDateStr);
const recs = records.filter(r=>r.date===label);
const inc = recs.filter(r=>r.type==='income').reduce((a,b)=>a+b.total,0);
const exp = recs.filter(r=>r.type==='expense').reduce((a,b)=>a+b.total,0);
const dai = recs.filter(r=>r.type==='daily').reduce((a,b)=>a+b.total,0);
const net = inc - exp - dai;

document.getElementById('headerNet').textContent = formatMoney(net);
document.getElementById('headerNet').style.color = net>=0?'#4ade80':'#f87171';
document.getElementById('hdrIncome').textContent = formatMoney(inc);
document.getElementById('hdrExpense').textContent = formatMoney(exp);
document.getElementById('hdrDaily').textContent = formatMoney(dai);
}

function renderHistory() {
const label = isoToDisplay(sharedDateStr);
const filtered = records.filter(r => r.date === label);
const list = document.getElementById('recordList');
if (!filtered.length) { list.innerHTML='<div class="empty-msg">這天沒有帳目</div>'; return; }
list.innerHTML = filtered.map(r => `
<div class="record-item">
<div class="record-icon" style="background:${CATS[r.type].bg}">${CATS[r.type].icon}</div>
<div class="record-info">
<div class="record-name">${r.name}</div>
<div class="record-meta">x${r.qty} ${r.note?'· '+r.note:''}</div>
</div>
<div class="record-val" style="color:${r.type==='income'?'#16a34a':'#ef4444'}">${formatMoney(r.total)}</div>
</div>`).join('');
}

function switchTab(name) {
document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
document.getElementById('tab-' + name).classList.add('active');
const idx = {record:0, history:1, products:2}[name];
document.querySelectorAll('.nav-btn')[idx].classList.add('active');
}

function setRecType(type) {
recType = type; selectedProduct = null;
document.querySelectorAll('.type-btn').forEach(b => b.className = 'type-btn');
document.querySelectorAll('.type-btn')[{income:0,expense:1,daily:2}[type]].className = `type-btn active-${type}`;
renderProductGrid(); hidePriceCard(); updateAddBtn();
}
function updateAddBtn() {
const btn = document.getElementById('addBtn');
btn.className = `add-btn add-btn-${recType}`;
btn.textContent = `記帳 ${CATS[recType].icon}`;
}
function setMode(m) {
recMode = m;
document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
document.querySelectorAll('.mode-btn')[m==='quick'?0:1].classList.add('active');
document.getElementById('quick-mode').style.display = m==='quick'?'block':'none';
document.getElementById('manual-mode').style.display = m==='manual'?'block':'none';
}
function renderProductGrid() {
const grid = document.getElementById('productGrid');
grid.innerHTML = products[recType].map(p => `
<button class="product-btn ${selectedProduct && selectedProduct.id===p.id ? 'selected-'+recType : ''}" onclick='selectProduct(${JSON.stringify(p)})'>
${p.name}
</button>`).join('');
}
function selectProduct(p) { selectedProduct=p; customPrice=''; qty=1; renderProductGrid(); renderPriceCard(); }
function hidePriceCard() { document.getElementById('priceCard').style.display='none'; }
function renderPriceCard() {
const card = document.getElementById('priceCard');
card.style.display = 'block';
card.innerHTML = `
<div class="price-card">
<div class="price-card-header"><div class="price-card-title">${selectedProduct.name}</div></div>
<div style="margin-bottom:14px"><input class="price-input price-input-${recType}" id="priceInput" type="number" placeholder="NT$" value="${customPrice}" oninput="customPrice=this.value;updateSubtotal()" /></div>
<div class="qty-row">
<button class="qty-btn" onclick="changeQty(-1)">−</button>
<input class="qty-input" id="qtyInput" type="number" value="${qty}" onchange="qty=parseInt(this.value);updateSubtotal()" />
<button class="qty-btn" onclick="changeQty(1)">+</button>
</div>
<input class="note-input" id="quickNote" placeholder="備註" style="margin-top:10px" />
</div>`;
}
function changeQty(d) { qty=Math.max(1,qty+d); if(document.getElementById('qtyInput')) document.getElementById('qtyInput').value=qty; if(document.getElementById('manualQty')) document.getElementById('manualQty').value=qty; updateSubtotal(); }
function updateSubtotal() {}

function init() {
const local = localStorage.getItem('bk_records');
if(local) records = JSON.parse(local);
setDate(todayISO());
renderProductGrid();
loadFromCloud(); // 異步載入雲端資料
}
init();
</script>
</body>
</html>
