<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>杦月初。植感食光 | 記帳管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
/* 保持你原本的所有樣式不動 */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; min-height: 100vh; color: #1e293b; }
#app { max-width: 480px; margin: 0 auto; position: relative; min-height: 100vh; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.05); }

.header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 20px; color: #fff; }
.header-date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
.hdr-arrow { background: rgba(255,255,255,0.1); border: none; border-radius: 8px; width: 36px; height: 36px; font-size: 20px; cursor: pointer; color: #fff; }
.hdr-date-center { text-align: center; flex: 1; }
.hdr-date-input { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: #fff; font-size: 17px; font-weight: 900; padding: 6px 12px; outline: none; }

.hdr-net-row { text-align: center; margin: 15px 0; }
.hdr-net-val { font-size: 36px; font-weight: 900; }

.summary-bar { display: flex; gap: 8px; margin-top: 10px; }
.summary-item { flex: 1; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px; border: 1px solid rgba(255,255,255,0.05); }
.summary-item-val { font-size: 13px; font-weight: 800; }

.nav { display: flex; background: #fff; border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; z-index: 100; }
.nav-btn { flex: 1; padding: 14px 0; font-size: 13px; background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; color: #94a3b8; font-weight: 700; }
.nav-btn.active { color: #0f172a; border-bottom-color: #0f172a; }

.content { padding: 20px 16px 120px; background: #f8fafc; }
.tab { display: none; }
.tab.active { display: block; }

.type-selector { display: flex; gap: 10px; margin-bottom: 15px; }
.type-btn { flex: 1; padding: 12px 0; border-radius: 12px; border: none; font-weight: 800; background: #e2e8f0; color: #64748b; }
.type-btn.active-income { background: #22c55e; color: #fff; }
.type-btn.active-expense { background: #ef4444; color: #fff; }
.type-btn.active-daily { background: #f59e0b; color: #fff; }

.product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.product-btn { padding: 15px 8px; border-radius: 14px; border: 2px solid #e2e8f0; background: #fff; font-weight: 800; }
.product-btn.selected-income { border-color: #22c55e; background: #f0fdf4; }
.product-btn.selected-expense { border-color: #ef4444; background: #fef2f2; }
.product-btn.selected-daily { border-color: #f59e0b; background: #fffbeb; }

/* 品項與月報的樣式 */
.prod-add-card { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 20px; }
.prod-type-btn { flex: 1; padding: 8px 0; border-radius: 8px; border: 1.5px solid #f1f5f9; background: #f8fafc; font-size: 12px; font-weight: 700; }
.prod-type-btn.active-income { border-color: #22c55e; color: #22c55e; background: #dcfce7; }
.prod-type-btn.active-expense { border-color: #ef4444; color: #ef4444; background: #fee2e2; }
.prod-type-btn.active-daily { border-color: #f59e0b; color: #f59e0b; background: #fef3c7; }

.prod-item { background: #fff; padding: 12px 16px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }

.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; background: #fff; padding: 8px 12px; border-radius: 12px; }
.month-summary { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); border-radius: 20px; padding: 20px; color: #fff; margin-bottom: 20px; }
.month-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; margin-top: 15px; }
.month-day-item { background: #fff; border-radius: 14px; padding: 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); margin-bottom: 10px; }

.record-item { background: #fff; border-radius: 16px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.add-btn { width: 100%; padding: 18px; border-radius: 16px; border: none; color: #fff; font-size: 17px; font-weight: 900; cursor: pointer; margin-top: 10px; }
.add-btn-income { background: #22c55e; }
.add-btn-expense { background: #ef4444; }
.add-btn-daily { background: #f59e0b; }

#toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px; display: none; z-index: 1000; }
</style>
</head>
<body>

<div id="app">
<div class="header">
<div class="header-date-nav">
<button class="hdr-arrow" onclick="shiftDate(-1)">‹</button>
<div class="hdr-date-center">
<input type="date" class="hdr-date-input" id="hdrDateInput" onchange="setDate(this.value)" />
</div>
<button class="hdr-arrow" onclick="shiftDate(1)">›</button>
</div>
<div class="hdr-net-row">
<div id="headerNet" class="hdr-net-val">NT$0</div>
</div>
<div class="summary-bar">
<div class="summary-item">收入 <span id="hdrIncome">0</span></div>
<div class="summary-item">進貨 <span id="hdrExpense">0</span></div>
<div class="summary-item">費用 <span id="hdrDaily">0</span></div>
</div>
</div>

<div class="nav">
<button class="nav-btn active" onclick="switchTab('record')">記帳</button>
<button class="nav-btn" onclick="switchTab('history')">帳目</button>
<button class="nav-btn" onclick="switchTab('products')">品項</button>
<button class="nav-btn" onclick="switchTab('monthly')">月報</button>
</div>

<div class="content">
<div id="tab-record" class="tab active">
<div class="type-selector">
<button id="btn-income" class="type-btn active-income" onclick="setRecType('income')">銷售收入</button>
<button id="btn-expense" class="type-btn" onclick="setRecType('expense')">進貨支出</button>
<button id="btn-daily" class="type-btn" onclick="setRecType('daily')">日常費用</button>
</div>
<div class="product-grid" id="productGrid"></div>
<div id="inputArea" style="background:#fff; padding:15px; border-radius:15px; display:none">
<h3 id="selectedName" style="margin-bottom:10px"></h3>
<input type="number" id="priceInput" placeholder="金額" style="width:100%; padding:10px; margin-bottom:10px" />
<input type="number" id="qtyInput" value="1" placeholder="數量" style="width:100%; padding:10px; margin-bottom:10px" />
<input type="text" id="noteInput" placeholder="備註" style="width:100%; padding:10px; margin-bottom:10px" />
</div>
<button class="add-btn add-btn-income" id="addBtn" onclick="addRecord()">確認記帳</button>
</div>

<div id="tab-history" class="tab"><div id="recordList"></div></div>

<div id="tab-products" class="tab">
<div class="prod-add-card">
<input type="text" id="newProdName" placeholder="品項名稱" style="width:100%; padding:10px; margin-bottom:10px" />
<div class="prod-type-row" style="display:flex; gap:5px; margin-bottom:10px">
<button id="p-inc" class="prod-type-btn active-income" onclick="setNewProdType('income')">收入</button>
<button id="p-exp" class="prod-type-btn" onclick="setNewProdType('expense')">進貨</button>
<button id="p-dai" class="prod-type-btn" onclick="setNewProdType('daily')">費用</button>
</div>
<button onclick="addProduct()" style="width:100%; padding:10px; background:#0f172a; color:#fff; border:none; border-radius:8px">新增品項</button>
</div>
<div id="productList"></div>
</div>

<div id="tab-monthly" class="tab">
<div class="month-nav">
<button onclick="shiftMonth(-1)">‹</button>
<div id="monthLabel" style="font-weight:900"></div>
<button onclick="shiftMonth(1)">›</button>
</div>
<div class="month-summary">
<div style="font-size:12px; opacity:0.8">本月盈餘</div>
<div id="monthNet" style="font-size:32px; font-weight:900">NT$0</div>
<div class="month-grid">
<div>收入<br><span id="monthInc">0</span></div>
<div>進貨<br><span id="monthExp">0</span></div>
<div>費用<br><span id="monthDai">0</span></div>
</div>
</div>
<div id="monthDayList"></div>
</div>
</div>
</div>

<div id="toast"></div>

<script>
// --- 1. API 配置 ---
const API_URL = 'https://script.google.com/macros/s/您的腳本ID/exec';

// --- 2. 資料狀態 ---
let records = JSON.parse(localStorage.getItem('jiuyue_recs') || '[]');
let products = JSON.parse(localStorage.getItem('jiuyue_prods') || '{"income":[],"expense":[],"daily":[]}');
let currentType = 'income', selectedProd = null, currentDate = '', currentMonth = '', newProdType = 'income';

// --- 3. API 傳輸函式 ---
async function syncToCloud(action, data) {
if (API_URL.includes('您的腳本ID')) return; // 未填 ID 則不執行
try {
// 使用 POST 送出資料
await fetch(API_URL, {
method: 'POST',
mode: 'no-cors', // 避開跨網域問題
body: JSON.stringify({ action, data, timestamp: new Date().toISOString() })
});
} catch (e) { console.error('API Sync Error:', e); }
}

// --- 4. 核心邏輯 (保持原樣) ---
function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }

function setDate(d) {
currentDate = d;
document.getElementById('hdrDateInput').value = d;
updateHeader();
renderHistory();
}

function shiftDate(v) {
let d = new Date(currentDate);
d.setDate(d.getDate() + v);
setDate(d.toISOString().split('T')[0]);
}

function switchTab(t) {
document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
document.getElementById('tab-'+t).classList.add('active');
event.target.classList.add('active');
if(t==='history') renderHistory();
if(t==='products') renderProducts();
if(t==='monthly') renderMonthly();
}

function setRecType(t) {
currentType = t;
document.querySelectorAll('.type-btn').forEach(el => el.className = 'type-btn');
document.getElementById('btn-'+t).classList.add('active-'+t);
document.getElementById('addBtn').className = 'add-btn add-btn-'+t;
renderProductGrid();
}

function renderProductGrid() {
const g = document.getElementById('productGrid');
g.innerHTML = '';
products[currentType].forEach(p => {
const b = document.createElement('button');
b.className = 'product-btn';
if(selectedProd && selectedProd.id === p.id) b.classList.add('selected-'+currentType);
b.innerText = p.name;
b.onclick = () => {
selectedProd = p;
document.getElementById('inputArea').style.display = 'block';
document.getElementById('selectedName').innerText = p.name;
renderProductGrid();
};
g.appendChild(b);
});
}

// --- 5. 修改：新增帳目時同步 API ---
function addRecord() {
const p = parseFloat(document.getElementById('priceInput').value);
const q = parseInt(document.getElementById('qtyInput').value);
if(!selectedProd || isNaN(p)) return showToast('請選擇品項並輸入金額');

const rec = {
id: Date.now(),
date: currentDate.replace(/-/g, '/'),
type: currentType,
name: selectedProd.name,
price: p, qty: q, total: p*q,
note: document.getElementById('noteInput').value
};

records.unshift(rec);
save();
updateHeader();
showToast('已記錄！');

// API 同步
syncToCloud('ADD_RECORD', rec);

// 重置
document.getElementById('priceInput').value = '';
document.getElementById('noteInput').value = '';
document.getElementById('inputArea').style.display = 'none';
selectedProd = null;
renderProductGrid();
}

// --- 6. 修改：刪除帳目時同步 API ---
function deleteRecord(id) {
records = records.filter(r => r.id !== id);
save();
renderHistory();
updateHeader();

// API 同步
syncToCloud('DEL_RECORD', { id });
}

// --- 7. 品項管理 (保持原樣，僅加 API) ---
function setNewProdType(t) {
newProdType = t;
document.querySelectorAll('.prod-type-btn').forEach(el => el.className = 'prod-type-btn');
document.getElementById('p-'+t.substring(0,3)).classList.add('active-'+t);
}

function addProduct() {
const n = document.getElementById('newProdName').value;
if(!n) return;
const p = { id: Date.now(), name: n };
products[newProdType].push(p);
save();
renderProducts();
document.getElementById('newProdName').value = '';

// API 同步
syncToCloud('ADD_PRODUCT', { type: newProdType, ...p });
}

function renderProducts() {
const l = document.getElementById('productList');
l.innerHTML = '';
['income','expense','daily'].forEach(t => {
products[t].forEach(p => {
l.innerHTML += `<div class="prod-item"><span>[${t}] ${p.name}</span><button onclick="delProd('${t}',${p.id})">刪除</button></div>`;
});
});
}

function delProd(t, id) {
products[t] = products[t].filter(p => p.id !== id);
save();
renderProducts();
syncToCloud('DEL_PRODUCT', { type: t, id });
}

// --- 8. 顯示與月報 (保持原樣) ---
function updateHeader() {
const day = currentDate.replace(/-/g, '/');
const dRecs = records.filter(r => r.date === day);
const inc = dRecs.filter(r => r.type === 'income').reduce((s, r) => s + r.total, 0);
const exp = dRecs.filter(r => r.type === 'expense').reduce((s, r) => s + r.total, 0);
const dai = dRecs.filter(r => r.type === 'daily').reduce((s, r) => s + r.total, 0);
document.getElementById('headerNet').innerText = 'NT$' + (inc-exp-dai).toLocaleString();
document.getElementById('hdrIncome').innerText = inc;
document.getElementById('hdrExpense').innerText = exp;
document.getElementById('hdrDaily').innerText = dai;
}

function renderHistory() {
const day = currentDate.replace(/-/g, '/');
const l = document.getElementById('recordList');
l.innerHTML = records.filter(r => r.date === day).map(r => `
<div class="record-item">
<div><b>${r.name}</b><br><small>${r.note||''}</small></div>
<div style="text-align:right">
<span style="color:${r.type==='income'?'green':'red'}">${r.type==='income'?'+':'-'}${r.total}</span><br>
<button onclick="deleteRecord(${r.id})" style="font-size:10px">刪除</button>
</div>
</div>
`).join('');
}

function shiftMonth(v) {
let [y, m] = currentMonth.split('-').map(Number);
let d = new Date(y, m - 1 + v, 1);
currentMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
renderMonthly();
}

function renderMonthly() {
document.getElementById('monthLabel').innerText = currentMonth;
const mPrefix = currentMonth.replace('-','/');
const mRecs = records.filter(r => r.date.startsWith(mPrefix));
const inc = mRecs.filter(r => r.type === 'income').reduce((s, r) => s + r.total, 0);
const exp = mRecs.filter(r => r.type === 'expense').reduce((s, r) => s + r.total, 0);
const dai = mRecs.filter(r => r.type === 'daily').reduce((s, r) => s + r.total, 0);

document.getElementById('monthNet').innerText = 'NT$' + (inc-exp-dai).toLocaleString();
document.getElementById('monthInc').innerText = inc;
document.getElementById('monthExp').innerText = exp;
document.getElementById('monthDai').innerText = dai;
}

function save() {
localStorage.setItem('jiuyue_recs', JSON.stringify(records));
localStorage.setItem('jiuyue_prods', JSON.stringify(products));
}

window.onload = () => {
const now = new Date();
currentMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
setDate(now.toISOString().split('T')[0]);
renderProductGrid();
};
</script>
</body>
</html>
